<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Example HTML Page</title>
    <link rel="stylesheet" type="css" href="../styles/terminal/style.css">
    <script src="../lib/gui/typewriter.js"></script>
    <script>

    </script>
</head>
<body>

    <button onclick="typeWriter()">Click me</button>

    <p id="demo"></p>

    <script>
        var i = 0;
        var txt = 'Lorem ipsum dummy text blabla.';
        var speed = 50;

        function typeWriter() {
            if (i < txt.length) {
                document.getElementById("demo").innerHTML += txt.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }
    </script>
</body>
</html>
